name: CI Pipeline - Enedis Lakehouse

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v3

      - name: Installation de Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Installation des dépendances
        run: pip install flake8 pytest

      - name: Vérification de la syntaxe (flake8)
        run: flake8 src/ tests/ --max-line-length=120

      - name: Lancement des tests unitaires (pytest)
        run: pytest tests/ -v
